          - paragraph [ref=e532]: Bazi, also known as the Four Pillars of Destiny, is one of the most powerful systems in Chinese astrology. By using a Bazi calculator, your birth year, month, day, and time are converted into a chart of Five Elements (Wood, Fire, Earth, Metal, Water) and Ten Gods. An AI Bazi reading helps you interpret this chart, offering structured insights into your personality, career timing, and relationship patterns.
          - generic [ref=e533]:
            - heading "What is a Bazi Calculator? Generating Your Four Pillars" [level=3] [ref=e534]
            - paragraph [ref=e535]: "The first step in Chinese astrology is generating your chart. A Bazi calculator uses your birth data to plot four columns (pillars): Year, Month, Day, and Hour. Each pillar consists of a Heavenly Stem and an Earthly Branch. Once the chart is generated, an AI Bazi reading can analyze the balance of the Five Elements and the strength of your Day Master to determine your favorable and unfavorable elements."
          - generic [ref=e536]:
            - 'heading "Bazi Analysis: Day Master, Five Elements, and Ten Gods" [level=3] [ref=e537]'
            - paragraph [ref=e538]: In Bazi analysis, the Day Master (the Heavenly Stem of your Day Pillar) represents your core self. The surrounding elements interact with your Day Master, creating the Ten Gods. These gods (such as Wealth, Officer, Resource, Output, and Companion) describe your relationship with money, authority, learning, expression, and peers. A structured Bazi reading decodes these interactions to reveal your natural strengths and blind spots.
          - generic [ref=e539]:
            - 'heading "Timing and Life Stages: Luck Pillars and Annual Transits" [level=3] [ref=e540]'
            - paragraph [ref=e541]: Your base Bazi chart is static, but your life is dynamic. This is where Luck Pillars come in. Every 10 years, you enter a new Luck Pillar that introduces different elements into your chart. An advanced AI Bazi reading analyzes how these Luck Pillars and annual transits interact with your natal chart, helping you identify the best times to change careers, start a business, or focus on relationships.
