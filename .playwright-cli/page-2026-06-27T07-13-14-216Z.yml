                      - generic [ref=e313]: "# 正月辛金 ## 来源 《穷通宝鉴》· 余春台著 · 清 · 通行本 ## 调候用神 正月辛金，寅月木旺土虚，辛金失令。取己土生金为先，壬水淘洗为辅。己土印绶护金，壬水淘洗去浊。 ## 命理分析 正月建寅，木旺当令，辛金处绝地，金气衰微。辛金与庚金不同，庚为阳金刚锐，辛为阴金柔脆，如珠玉首饰之金，体质柔弱，更易受克。寅月木旺盗金之气，丙火长生克金之力渐增，辛金无根而虚浮。 辛金为阴金，喜己土为母，己土亦为阴土，母子相生，阴阳相得。正月寅月，木旺土虚，己土自顾不暇。然辛金之性..."
