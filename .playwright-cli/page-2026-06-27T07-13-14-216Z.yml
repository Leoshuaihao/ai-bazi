                      - generic [ref=e301]: "# 论用神格局高低 ## 来源 《子平真诠》卷二 · 沈孝瞻著 · 清 · 通行本 ## 原文 格局高低，关乎用神之有情无情、有力无力。八字之贵贱，尽系于此。何谓有情？何谓有力？此不可不深究也。 有情者，用神得生得助，有辅佐之神也。如正官格，有财星生官，官星得财之助，则为有情。又如官格有印绶护官，印制伤化杀，使官星不受伤损，亦为有情。再如七杀格，有食神制之，杀被食制而化为权威，杀食相制有情。伤官格，有印制伤护官，亦有情。 无情者，用神被克被泄，无辅佐之神也。如正官格，伤官克官..."
