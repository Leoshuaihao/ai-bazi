                      - generic [ref=e307]: "# 论印绶 ## 来源 《子平真诠》卷三 · 沈孝瞻著 · 清 · 通行本 ## 原文 印绶者，生我之异性也。与日主阴阳相异者为正印，阴阳相同者为偏印（又名枭神）。印绶为生气，为母亲，为学业，为文书。月令印绶当权，则为印绶格。 印格之构成：月令正印或偏印当权，日主得印绶之生。如甲日主生于子月，子中癸水为正印，为正印格。生于亥月，亥中壬水为偏印，为偏印格。 印之喜：一喜官杀相生。官杀生印，印有源头，印绶有力。二喜比劫泄秀。印绶太重则壅滞，有比劫泄印之秀气，日主受益。三喜日主有根..."
