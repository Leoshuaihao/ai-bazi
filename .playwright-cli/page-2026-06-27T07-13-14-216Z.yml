                      - generic [ref=e319]: "# 正印格 ## 来源 《滴天髓》八格论 · 刘伯温著 · 任铁樵注 · 明 · 任铁樵注本 ## 原文 印绶得之，不喜见财。 ## 任铁樵注 正印者，生我之阴阳异性者也。如甲见癸、乙见壬之类。正印主文采、学识、荫庇。印绶格成格，不喜见财星——盖财能破印也。印绶为护身之本，生身之源，若被财破，则身无所护，源无所出。 然\"不喜见财\"非绝对之论。若印绶过旺，身强印重，反以财星损印为美，此即\"印多用财\"之法。若印绶衰弱而财星猖獗，则印被财破，为祸不浅。故财印相战之局，当视日主之强弱..."
